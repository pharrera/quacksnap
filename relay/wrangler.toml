name = "quacksnap-relay"
main = "worker.js"
compatibility_date = "2026-07-01"

[[r2_buckets]]
binding = "BLOBS"
bucket_name = "quacksnap-blobs"

[[kv_namespaces]]
binding = "TOKENS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Secrets (set with `wrangler secret put NAME`):
#   APNS_TEAM_ID      Apple Developer team id
#   APNS_KEY_ID       APNs auth key id (the .p8 key)
#   APNS_PRIVATE_KEY  contents of the .p8 file
#   APNS_TOPIC        app bundle id, e.g. com.peterherrera.quacksnap
